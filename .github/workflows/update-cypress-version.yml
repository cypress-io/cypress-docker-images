name: Update Cypress version
# Opens a PR bumping CYPRESS_VERSION in factory/.env whenever a newer cypress
# release is published to npm. Merging that PR into master triggers the
# CircleCI pipeline that builds and publishes the new cypress/included image.
#
# Triggers:
#   - schedule: daily poll of the npm registry as a safety net.
#   - repository_dispatch: fired by the cypress release pipeline for a fast,
#     event-driven bump (event type: cypress-released).
#   - workflow_dispatch: manual run, with an optional explicit version override.

on:
  schedule:
    - cron: '0 13 * * *'
  repository_dispatch:
    types: [cypress-released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit cypress version to pin (defaults to npm latest)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cypress-version:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Check for a newer cypress version
        id: check
        run: node scripts/check-cypress-version.mjs ${{ inputs.version || github.event.client_payload.version || '' }}

      - name: Open pull request
        if: steps.check.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # A dedicated bot token (CYPRESS_BOT_TOKEN) lets the resulting PR run
          # required status checks; GITHUB_TOKEN-authored PRs do not trigger
          # other workflows. Falls back to GITHUB_TOKEN when the secret is unset.
          token: ${{ secrets.CYPRESS_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: chore/cypress-${{ steps.check.outputs.version }}
          commit-message: 'chore: increment cypress to v${{ steps.check.outputs.version }}'
          title: 'chore: increment cypress to v${{ steps.check.outputs.version }}'
          body: |
            Automated update of `CYPRESS_VERSION` in `factory/.env`.

            - Previous: `${{ steps.check.outputs.previous }}`
            - New: `${{ steps.check.outputs.version }}`

            Merging into `master` publishes a new `cypress/included` image via CircleCI.

            > Generated by the `update-cypress-version` workflow.
          labels: 'process: build'
          delete-branch: true
